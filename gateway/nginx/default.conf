server {
    listen 80;
    server_name _;

    location / {
        return 200 'API Gateway - kiemtra01_01.06_duongnt';
        add_header Content-Type text/plain;
    }

    location /customer/ {
        proxy_pass http://customer-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /staff/ {
        proxy_pass http://staff-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /laptop/ {
        proxy_pass http://laptop-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /mobile/ {
        proxy_pass http://mobile-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/laptops/ {
        proxy_pass http://laptop-service:8000/api/laptops/;
        proxy_set_header Host $host;
    }

    location = /api/laptop {
        return 301 http://localhost:8080/api/laptops/;
    }

    location = /api/laptop/ {
        return 301 http://localhost:8080/api/laptops/;
    }

    location /api/mobiles/ {
        proxy_pass http://mobile-service:8000/api/mobiles/;
        proxy_set_header Host $host;
    }

    location = /api/mobile {
        return 301 http://localhost:8080/api/mobiles/;
    }

    location = /api/mobile/ {
        return 301 http://localhost:8080/api/mobiles/;
    }
}
