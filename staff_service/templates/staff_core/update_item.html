<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Update Item</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #dcdce0;
      --panel: #f5f5f7;
      --text: #101319;
      --line: #dedfe5;
      --accent: #2d56e3;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); font-family: "Manrope", sans-serif; color: var(--text); }
    .container { max-width: 760px; margin: 36px auto; background: var(--panel); border: 1px solid #d1d2d8; border-radius: 20px; overflow: hidden; }
    .head { padding: 20px 24px; border-bottom: 1px solid var(--line); background: linear-gradient(130deg, #fff, #f1f3f9); }
    .head h1 { margin: 0; font-size: 34px; letter-spacing: -0.03em; }
    form { padding: 20px 24px 24px; }
    input, textarea { width: 100%; padding: 10px 12px; border: 1px solid #d0d4e1; border-radius: 10px; margin-bottom: 8px; background: #f8f9fc; font: inherit; }
    .actions { display: flex; gap: 8px; margin-top: 6px; }
    button, a { border: 0; border-radius: 999px; background: var(--accent); color: #fff; padding: 10px 14px; text-decoration: none; font-weight: 700; cursor: pointer; }
    a { background: #e6ebff; color: #203a99; }
  </style>
</head>
<body>
<div class="container">
  <div class="head">
    <h1>Edit item #{{ item.id }}</h1>
  </div>
  <form method="post">
    {% csrf_token %}
    <input type="text" name="name" value="{{ item.name }}" required />
    <input type="text" name="category" value="{{ item.category }}" required />
    <input type="number" step="0.01" name="price" value="{{ item.price }}" required />
    <input type="number" name="stock" value="{{ item.stock }}" required />
    <textarea name="description" rows="3">{{ item.description }}</textarea>
    <div class="actions">
      <button type="submit">Save changes</button>
      <a href="{% url 'staff_inventory' %}">Back to inventory</a>
    </div>
  </form>
</div>
</body>
</html>
